<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appointment Management System</title>
    <link rel="shortcut icon" href="LOGO.png" type="image/x-icon">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
        background-color: #f5f5f5;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        background-color: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      h1 {
        color: #2c3e50;
        margin-bottom: 30px;
      }
      .option-card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 30px;
        margin: 20px 0;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .option-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        border-color: #3498db;
      }
      .option-card i {
        font-size: 48px;
        color: #3498db;
        margin-bottom: 15px;
      }
      .option-card h3 {
        color: #2c3e50;
        margin-bottom: 10px;
      }
      .option-card p {
        color: #7f8c8d;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Appointment Management System</h1>
      
      <div class="row">
        <div class="col-md-6">
          <div class="option-card" onclick="window.location.href='appointment.html'">
            <i class="fas fa-calendar-plus"></i>
            <h3>New Appointment</h3>
            <p>Book a new appointment for a patient</p>
          </div>
        </div>
        
        <div class="col-md-6">
          <div class="option-card" onclick="window.location.href='upcomingAppointment.html'">
            <i class="fas fa-list-alt"></i>
            <h3>Upcoming Appointments</h3>
            <p>View and manage scheduled appointments</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
