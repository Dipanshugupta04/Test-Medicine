<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .filter-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
        }
        .status-pending {
            color: #f39c12;
            font-weight: 500;
        }
        .status-confirmed {
            color: #2ecc71;
            font-weight: 500;
        }
        .status-cancelled {
            color: #e74c3c;
            font-weight: 500;
        }
        .status-completed {
            color: #3498db;
            font-weight: 500;
        }
        .status-rescheduled {
            color: #9b59b6;
            font-weight: 500;
        }
        .action-btn {
            padding: 5px 10px;
            margin: 0 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .edit-btn {
            background-color: #3498db;
            color: white;
        }
        .edit-btn:hover {
            background-color: #2980b9;
        }
        .delete-btn {
            background-color: #e74c3c;
            color: white;
        }
        .delete-btn:hover {
            background-color: #c0392b;
        }
        .back-btn {
            background-color: #7f8c8d;
            margin-right: 10px;
            color: white;
        }
        .back-btn:hover {
            background-color: #6c7a7d;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 600px;
            border-radius: 5px;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: black;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn back-btn" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i> Back
        </button>
        <h1>Upcoming Appointments</h1>

        <div class="filter-controls">
            <input type="text" id="searchInput" class="form-control" placeholder="Search appointments...">
            <select id="statusFilter" class="form-select">
                <option value="">All Statuses</option>
                <option value="PENDING">Pending</option>
                <option value="CONFIRMED">Confirmed</option>
                <option value="COMPLETED">Completed</option>
                <option value="CANCELLED">Cancelled</option>
                <option value="RESCHEDULED">Rescheduled</option>
            </select>
            <select id="typeFilter" class="form-select">
                <option value="">All Types</option>
                <option value="CONSULTATION">Consultation</option>
                <option value="FOLLOW_UP">Follow Up</option>
                <option value="EMERGENCY">Emergency</option>
                <option value="ROUTINE_CHECKUP">Routine Checkup</option>
                <option value="TEST">Test</option>
            </select>
        </div>

        <table id="appointmentsTable" class="table">
            <thead>
                <tr>
                    <th>Patient</th>
                    <th>Doctor</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="appointmentsBody">
                <!-- Appointments will be loaded here -->
            </tbody>
        </table>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit Appointment</h2>
            <form id="editForm">
                <!-- Form fields will be dynamically added here -->
            </form>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8080/api/appointments";
        let appointments = [];

        // DOM Elements
        const appointmentsBody = document.getElementById("appointmentsBody");
        const searchInput = document.getElementById("searchInput");
        const statusFilter = document.getElementById("statusFilter");
        const typeFilter = document.getElementById("typeFilter");
        const modal = document.getElementById("editModal");
        const closeBtn = document.querySelector(".close");
        const editForm = document.getElementById("editForm");

        // Load all appointments on page load
        document.addEventListener("DOMContentLoaded", () => {
            loadAppointments();
        });

        // Load appointments from API
        async function loadAppointments() {
            try {
                const response = await fetch(API_URL, {
                    headers: {
                        "Authorization": "Bearer eyJ0eXBlIjoiand0IiwiYWxnIjoiSFMyNTYifQ.eyJzdWIiOiJkaXBhbnNodTIzQGdtYWlsLmNvbSIsImlhdCI6MTc1MjY3ODcxNiwiZXhwIjoxNzUyNjgyMzE2fQ.QtNb1PLq4Y6XXIY-_v_Kfyz0PQ0lNRw6puBlbSdT6A0"
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                appointments = await response.json();
                renderAppointments(appointments);
            } catch (error) {
                console.error("Error loading appointments:", error);
                alert("Failed to load appointments. Please try again.");
            }
        }

        // Render appointments to the table
        function renderAppointments(data) {
            appointmentsBody.innerHTML = "";

            if (data.length === 0) {
                const row = document.createElement("tr");
                row.innerHTML = `<td colspan="7" style="text-align: center;">No appointments found</td>`;
                appointmentsBody.appendChild(row);
                return;
            }

            data.forEach((appointment) => {
                const row = document.createElement("tr");
                
                // Format date and time
                const formattedDate = formatDate(appointment.appointmentDate);
                const formattedTime = formatTime(appointment.appointmentTime);
                const formattedType = formatType(appointment.appointmentType);

                row.innerHTML = `
                    <td>${appointment.patientName}</td>
                    <td>${appointment.doctorName}</td>
                    <td>${formattedDate}</td>
                    <td>${formattedTime}</td>
                    <td>${formattedType}</td>
                    <td class="status-${appointment.appointmentStatus.toLowerCase()}">
                        ${appointment.appointmentStatus}
                    </td>
                    <td>
                        <button class="action-btn edit-btn" onclick="openEditModal('${appointment.appointmentID}')">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="action-btn delete-btn" onclick="deleteAppointment('${appointment.appointmentID}')">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </td>
                `;

                appointmentsBody.appendChild(row);
            });
        }

        // Filter appointments
        searchInput.addEventListener("input", filterAppointments);
        statusFilter.addEventListener("change", filterAppointments);
        typeFilter.addEventListener("change", filterAppointments);

        function filterAppointments() {
            const searchTerm = searchInput.value.toLowerCase();
            const statusFilterValue = statusFilter.value;
            const typeFilterValue = typeFilter.value;

            const filtered = appointments.filter((appointment) => {
                const matchesSearch =
                    appointment.patientName.toLowerCase().includes(searchTerm) ||
                    appointment.doctorName.toLowerCase().includes(searchTerm) ||
                    (appointment.appointmentID && appointment.appointmentID.toLowerCase().includes(searchTerm));

                const matchesStatus = statusFilterValue
                    ? appointment.appointmentStatus === statusFilterValue
                    : true;

                const matchesType = typeFilterValue
                    ? appointment.appointmentType === typeFilterValue
                    : true;

                return matchesSearch && matchesStatus && matchesType;
            });

            renderAppointments(filtered);
        }

        // Delete an appointment
        async function deleteAppointment(appointmentID) {
            if (confirm("Are you sure you want to delete this appointment?")) {
                try {
                    const response = await fetch(`${API_URL}/${appointmentID}`, {
                        method: "DELETE",
                        headers: {
                            "Authorization": "Bearer eyJ0eXBlIjoiand0IiwiYWxnIjoiSFMyNTYifQ.eyJzdWIiOiJkaXBhbnNodTIzQGdtYWlsLmNvbSIsImlhdCI6MTc1MjY3ODcxNiwiZXhwIjoxNzUyNjgyMzE2fQ.QtNb1PLq4Y6XXIY-_v_Kfyz0PQ0lNRw6puBlbSdT6A0"
                        }
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    alert("Appointment deleted successfully!");
                    loadAppointments();
                } catch (error) {
                    console.error("Error:", error);
                    alert("Failed to delete appointment. Please try again.");
                }
            }
        }

        // Edit an appointment (simplified to show only status, date, time, and address)
        function openEditModal(appointmentID) {
            const appointment = appointments.find(a => a.appointmentID === appointmentID);
            if (!appointment) {
                alert("Appointment not found");
                return;
            }

            editForm.innerHTML = `
                <input type="hidden" name="appointmentID" value="${appointment.appointmentID}">
                
                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select name="appointmentStatus" class="form-control" required>
                        <option value="PENDING" ${appointment.appointmentStatus === "PENDING" ? "selected" : ""}>Pending</option>
                        <option value="CONFIRMED" ${appointment.appointmentStatus === "CONFIRMED" ? "selected" : ""}>Confirmed</option>
                        <option value="COMPLETED" ${appointment.appointmentStatus === "COMPLETED" ? "selected" : ""}>Completed</option>
                        <option value="CANCELLED" ${appointment.appointmentStatus === "CANCELLED" ? "selected" : ""}>Cancelled</option>
                        <option value="RESCHEDULED" ${appointment.appointmentStatus === "RESCHEDULED" ? "selected" : ""}>Rescheduled</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Date</label>
                    <input type="date" name="appointmentDate" class="form-control" 
                        value="${appointment.appointmentDate}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Time</label>
                    <input type="time" name="appointmentTime" class="form-control" 
                        value="${formatTimeForInput(appointment.appointmentTime)}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <input type="text" name="address" class="form-control" 
                        value="${appointment.location || ''}" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Update Appointment</button>
            `;

            // Set minimum date to today
            const today = new Date().toISOString().split("T")[0];
            editForm.querySelector("input[name='appointmentDate']").min = today;

            modal.style.display = "block";
        }

        // Close modal
        closeBtn.addEventListener("click", () => {
            modal.style.display = "none";
        });

        // Modal form submission using PATCH
        editForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const formData = new FormData(editForm);
            const appointmentID = formData.get("appointmentID");

            // Format time to HH:mm:ss
            const timeValue = formData.get("appointmentTime");
            const formattedTime = timeValue + ":00";

            const updatedData = {
                appointmentStatus: formData.get("appointmentStatus"),
                appointmentDate: formData.get("appointmentDate"),
                appointmentTime: formattedTime,
                location: formData.get("address"),
                updatedAt: new Date().toISOString()
            };

            try {
                const response = await fetch(`${API_URL}/${appointmentID}`, {
                    method: "PATCH", // Using PATCH instead of PUT
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer eyJ0eXBlIjoiand0IiwiYWxnIjoiSFMyNTYifQ.eyJzdWIiOiJkaXBhbnNodTIzQGdtYWlsLmNvbSIsImlhdCI6MTc1MjY3ODcxNiwiZXhwIjoxNzUyNjgyMzE2fQ.QtNb1PLq4Y6XXIY-_v_Kfyz0PQ0lNRw6puBlbSdT6A0"
                    },
                    body: JSON.stringify(updatedData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                alert("Appointment updated successfully!");
                modal.style.display = "none";
                loadAppointments();
            } catch (error) {
                console.error("Error:", error);
                alert("Failed to update appointment. Please try again.");
            }
        });

        // Close modal when clicking outside
        window.addEventListener("click", (e) => {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        });

        // Helper functions
        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString).toLocaleDateString(undefined, options);
        }

        function formatTime(timeString) {
            if (!timeString) return "";
            const [hours, minutes] = timeString.split(":");
            const hour = parseInt(hours);
            const ampm = hour >= 12 ? "PM" : "AM";
            const hour12 = hour % 12 || 12;
            return `${hour12}:${minutes} ${ampm}`;
        }

        function formatType(type) {
            return type ? type.replace("_", " ") : "";
        }

        function formatTimeForInput(timeString) {
            if (!timeString) return "";
            return timeString.substring(0, 5); // Extract HH:mm from HH:mm:ss
        }
    </script>
</body>
</html>
