<!DOCTYPE html>
<html>
<head>
<title>Start Consultation</title>
</head>

<body>

<h2>Online Consultation</h2>

<button onclick="startConsultation()">Start Consultation</button>

<script>

function startConsultation(){

fetch("http://localhost:8080/consultation/create",{
method:"POST"
})
.then(res=>res.json())
.then(data=>{

    const roomId = data.roomId;

    window.location.href =
    "consultation.html?room="+roomId+"&user=patient";

});

}

</script>

</body>
</html>
