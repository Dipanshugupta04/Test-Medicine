<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Consultation</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Jitsi -->
<script src="https://meet.jit.si/external_api.js"></script>

<style>
:root {
    --primary: #0d6efd;
    --bg: #f4f7fb;
}

body {
    background: var(--bg);
    font-family: 'Segoe UI', sans-serif;
}

/* Layout */
.container-box {
    max-width: 1200px;
    margin: 30px auto;
}

/* Card */
.card {
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

/* Jitsi container */
#jitsi-container {
    height: 500px;
    border-radius: 10px;
    overflow: hidden;
}

/* Buttons */
.control-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 18px;
}

.btn-danger {
    width: 60px;
    height: 60px;
}

/* Info panel */
.info-box img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
}

/* Status */
#status {
    font-weight: 500;
}
</style>
</head>

<body>

<div class="container-box">
<div class="row">

<!-- LEFT: VIDEO -->
<div class="col-lg-8">
<div class="card p-3">

<h5 class="mb-3">🎥 Live Consultation</h5>

<div id="jitsi-container"></div>

<!-- Controls -->
<div class="d-flex justify-content-center gap-3 mt-3">
<button id="video" class="btn btn-outline-primary control-btn">
<i class="fas fa-video"></i>
</button>

<button id="audio" class="btn btn-outline-primary control-btn">
<i class="fas fa-microphone"></i>
</button>

<button id="chat" class="btn btn-outline-primary control-btn">
<i class="fas fa-comment"></i>
</button>

<button id="end" class="btn btn-danger control-btn">
<i class="fas fa-phone-slash"></i>
</button>
</div>

<p id="status" class="text-center mt-3 text-success"></p>

</div>
</div>

<!-- RIGHT: DETAILS -->
<div class="col-lg-4">
<div class="card p-3 info-box">

<div class="d-flex align-items-center mb-3">
<img src="https://via.placeholder.com/70" class="me-3">
<div>
<h6 class="mb-0">Doctor</h6>
<small id="doctorName">Loading...</small>
</div>
</div>

<hr>

<ul class="list-group">
<li class="list-group-item d-flex justify-content-between">
Date <span id="date"></span>
</li>
<li class="list-group-item d-flex justify-content-between">
Time <span id="time"></span>
</li>
<li class="list-group-item d-flex justify-content-between">
Patient <span id="patient"></span>
</li>
</ul>

<div class="alert alert-info mt-3">
⏺ Your consultation is secure
</div>

</div>
</div>

</div>
</div>

<script>

function startMeeting(){

let meetingLink = localStorage.getItem("meetingLink");

if(!meetingLink){
alert("No meeting link found");
return;
}

// ROOM NAME
let room = meetingLink.split("/").pop();

// TIME CHECK
let apptTime = localStorage.getItem("appointmentTime");

if(apptTime){
let now = new Date();
let time = new Date(apptTime);

if(now < time){
document.getElementById("status").innerText = "⏰ Meeting not started yet";
return;
}
}

// INIT JITSI
let api = new JitsiMeetExternalAPI("meet.jit.si",{
roomName: room,
width:"100%",
height:500,
parentNode: document.getElementById("jitsi-container"),
userInfo:{
displayName: localStorage.getItem("userName") || "User"
}
});

// CONTROLS
document.getElementById("video").onclick = ()=>api.executeCommand("toggleVideo");
document.getElementById("audio").onclick = ()=>api.executeCommand("toggleAudio");
document.getElementById("chat").onclick = ()=>api.executeCommand("toggleChat");

document.getElementById("end").onclick = ()=>{
api.executeCommand("hangup");
document.getElementById("status").innerText = "✅ Consultation Ended";
};

// INFO SET
document.getElementById("patient").innerText = localStorage.getItem("userName");

let dateTime = localStorage.getItem("appointmentTime");
if(dateTime){
let d = new Date(dateTime);
document.getElementById("date").innerText = d.toLocaleDateString();
document.getElementById("time").innerText = d.toLocaleTimeString();
}

}

window.onload = startMeeting;

</script>

</body>
</html>
